{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Регистрация</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Зарегистрироваться</button>
    </form>
    <p>Уже есть аккаунт? <a href="{% url 'users:login' %}">Войти</a></p>
</div>
{% endblock %}
