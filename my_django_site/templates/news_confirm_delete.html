{% extends 'base.html' %}

{% block title %}Удалить{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Удалить новость</h1>
    <p>Вы уверены, что хотите удалить "{{ news.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-delete">Да, удалить</button>
        <a href="{% url 'news:news_detail' news.pk %}" class="btn-cancel">Отмена</a>
    </form>
</div>
{% endblock %}
