{% extends 'base.html' %}

{% block title %}Редактировать{% endblock %}

{% block content %}
<div class="form-page">
    <h1>Редактировать: {{ news.title }}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">Сохранить</button>
        <a href="{% url 'news:news_detail' news.pk %}" class="btn-cancel">Отмена</a>
    </form>
</div>
{% endblock %}
